{% extends "student/assignment/assignment.html" %}

{% block assignment_content %}

<div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 mb-5">
    <div>
        <h2 class="text-xl font-bold tracking-tight text-white">Available Assignments</h2>
        <p class="text-sm text-slate-400 mt-1">Review current tasks and their deadlines.</p>
    </div>
</div>

<div class="overflow-hidden rounded-xl border border-slate-700">
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-700">
            <thead class="bg-slate-900/70">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-400">Title</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-400">Description</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-400">Due Date</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-800 bg-slate-900/40">
                <tr class="transition-colors duration-150 hover:bg-slate-800/45">
                    <td class="px-4 py-3 text-sm font-medium text-slate-200">Assignment 1</td>
                    <td class="px-4 py-3 text-sm text-slate-300">Intro to Python</td>
                    <td class="px-4 py-3 text-sm text-slate-300">10 June</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
