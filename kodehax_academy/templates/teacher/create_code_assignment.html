{% extends "teacher/base.html" %}

{% block title %}Create Coding Assignment{% endblock %}
{% block page_title %}New Coding Assignment{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
  <section class="glass-card hover-lift p-7 reveal">
    <div class="mb-6">
      <p class="text-xs uppercase tracking-[0.14em] text-slate-400">Classroom: {{ classroom.name }}</p>
      <h3 class="text-3xl font-black text-white mt-1">Create Coding Assignment</h3>
    </div>

    {% if error %}
    <div class="bg-rose-900/20 border border-rose-500/40 text-rose-300 px-4 py-3 rounded-xl mb-6 text-sm font-medium">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-6">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-slate-200 mb-2">Assignment Title</label>
        <input type="text" name="title" required class="w-full rounded-xl border border-slate-600 bg-slate-900/50 px-4 py-2.5 text-slate-200">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-200 mb-2">Prompt / Problem Statement</label>
        <textarea name="description" rows="8" required class="w-full rounded-xl border border-slate-600 bg-slate-900/50 px-4 py-2.5 text-slate-200"></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-200 mb-2">Due Date & Time</label>
        <input type="datetime-local" name="due_date" required class="w-full rounded-xl border border-slate-600 bg-slate-900/50 px-4 py-2.5 text-slate-200">
      </div>

      <button type="submit" class="btn-primary px-6 py-2.5">Create Coding Assignment</button>
    </form>
  </section>
</div>
{% endblock %}
