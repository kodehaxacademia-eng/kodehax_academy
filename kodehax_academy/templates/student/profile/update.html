{% extends "student/base.html" %}

{% block header %}Update Profile{% endblock %}

{% block content %}

<style>
  @keyframes formSlideIn {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .form-enter {
    animation: formSlideIn 0.45s ease-out;
  }
</style>

<div class="max-w-3xl mx-auto form-enter">
  <form method="POST" enctype="multipart/form-data" class="rounded-2xl border border-slate-200 bg-white/95 p-6 sm:p-8 shadow-sm backdrop-blur space-y-6 transition-all duration-300 hover:shadow-lg">
    {% csrf_token %}

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
      <div>
        <label for="username" class="mb-2 block text-sm font-medium text-slate-700">Username</label>
        <input id="username" type="text" name="username" value="{{ request.user.username }}" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email</label>
        <input id="email" type="email" name="email" value="{{ request.user.email }}" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="phone_number" class="mb-2 block text-sm font-medium text-slate-700">Phone Number</label>
        <input id="phone_number" type="text" name="phone_number" value="{{ profile.phone_number }}" placeholder="Enter phone number" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="course" class="mb-2 block text-sm font-medium text-slate-700">Course</label>
        <input id="course" type="text" name="course" value="{{ profile.course }}" placeholder="Enter course name" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="batch" class="mb-2 block text-sm font-medium text-slate-700">Batch</label>
        <input id="batch" type="text" name="batch" value="{{ profile.batch }}" placeholder="e.g. 2026-A" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="student_id" class="mb-2 block text-sm font-medium text-slate-700">Student ID</label>
        <input id="student_id" type="text" name="student_id" value="{{ profile.student_id }}" placeholder="Enter student ID" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="date_of_birth" class="mb-2 block text-sm font-medium text-slate-700">Date of Birth</label>
        <input id="date_of_birth" type="date" name="date_of_birth" value="{{ profile.date_of_birth|date:'Y-m-d' }}" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="gender" class="mb-2 block text-sm font-medium text-slate-700">Gender</label>
        <select id="gender" name="gender" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
          <option value="">Select gender</option>
          <option value="Male" {% if profile.gender == "Male" %}selected{% endif %}>Male</option>
          <option value="Female" {% if profile.gender == "Female" %}selected{% endif %}>Female</option>
          <option value="Other" {% if profile.gender == "Other" %}selected{% endif %}>Other</option>
        </select>
      </div>

      <div>
        <label for="parent_name" class="mb-2 block text-sm font-medium text-slate-700">Parent Name</label>
        <input id="parent_name" type="text" name="parent_name" value="{{ profile.parent_name }}" placeholder="Enter parent name" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="parent_phone" class="mb-2 block text-sm font-medium text-slate-700">Parent Phone</label>
        <input id="parent_phone" type="text" name="parent_phone" value="{{ profile.parent_phone }}" placeholder="Enter parent phone" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="parent_email" class="mb-2 block text-sm font-medium text-slate-700">Parent Email</label>
        <input id="parent_email" type="email" name="parent_email" value="{{ profile.parent_email }}" placeholder="Enter parent email" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>

      <div>
        <label for="guardian_relation" class="mb-2 block text-sm font-medium text-slate-700">Guardian Relation</label>
        <input id="guardian_relation" type="text" name="guardian_relation" value="{{ profile.guardian_relation }}" placeholder="e.g. Father, Mother, Guardian" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
      </div>
    </div>

    <div>
      <label for="address" class="mb-2 block text-sm font-medium text-slate-700">Address</label>
      <textarea id="address" name="address" rows="4" placeholder="Enter full address" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-slate-800 shadow-sm transition-all duration-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">{{ profile.address }}</textarea>
    </div>

    <div>
      <label for="profile_picture" class="mb-2 block text-sm font-medium text-slate-700">Profile Picture</label>
      <input id="profile_picture" type="file" name="profile_picture" class="block w-full cursor-pointer rounded-lg border border-slate-300 bg-white text-sm text-slate-700 file:mr-4 file:rounded-md file:border-0 file:bg-blue-50 file:px-4 file:py-2 file:font-medium file:text-blue-700 hover:file:bg-blue-100 focus:outline-none focus:ring-2 focus:ring-blue-200">
    </div>

    <div class="flex items-center gap-3 pt-1">
      <button type="submit" class="inline-flex items-center justify-center rounded-lg bg-green-600 px-5 py-2.5 text-sm font-medium text-white transition-all duration-200 hover:bg-green-700 hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
        Update Profile
      </button>
      <a href="{% url 'student_profile' %}" class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-5 py-2.5 text-sm font-medium text-slate-700 transition-colors duration-200 hover:bg-slate-50">
        Cancel
      </a>
    </div>
  </form>
</div>

{% endblock %}
