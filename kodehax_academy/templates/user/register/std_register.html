{% extends "user/base.html" %}

{% block title %}Student Register{% endblock %}

{% block content %}
<div class="w-full max-w-md animate-fade-up">
    <div class="portal-card bg-white/90 backdrop-blur p-8 rounded-2xl shadow-2xl border border-emerald-100">

        <p class="text-xs font-semibold tracking-[0.2em] text-green-600 text-center mb-2">WELCOME STUDENT</p>
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
            Student Registration
        </h2>

        <form method="POST" class="space-y-4">

            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
            class="w-full border border-emerald-100 p-3 rounded-xl bg-white/80 focus:outline-none focus:ring-2 focus:ring-green-500 transition focus:-translate-y-0.5">

            <input type="email" name="email" placeholder="Email"
            class="w-full border border-emerald-100 p-3 rounded-xl bg-white/80 focus:outline-none focus:ring-2 focus:ring-green-500 transition focus:-translate-y-0.5">

            <input type="password" name="password1" placeholder="Password"
            class="w-full border border-emerald-100 p-3 rounded-xl bg-white/80 focus:outline-none focus:ring-2 focus:ring-green-500 transition focus:-translate-y-0.5">

            <input type="password" name="password2" placeholder="Confirm Password"
            class="w-full border border-emerald-100 p-3 rounded-xl bg-white/80 focus:outline-none focus:ring-2 focus:ring-green-500 transition focus:-translate-y-0.5">

            <button
            class="w-full bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition hover:scale-[1.02]">
            Register as Student
            </button>

        </form>

        <p class="text-center text-sm mt-4 text-gray-600">
            Already have an account?
            <a href="{% url 'student_login' %}" class="text-green-600 hover:underline transition hover:text-green-700">
                Login
            </a>
        </p>

    </div>
</div>
{% endblock %}
