{% extends "user/base.html" %}

{% block title %}Student Login{% endblock %}
{% block extra_head %}
<style>
    .auth-card {
        background: rgba(2, 6, 23, 0.82);
        border: 1px solid rgba(71, 85, 105, 0.7);
        border-radius: 1rem;
    }

    .auth-btn {
        width: 100%;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        font-weight: 700;
        color: #e2e8f0;
        background: rgba(30, 41, 59, 0.9);
        border: 1px solid rgba(99, 102, 241, 0.5);
        transition: background 160ms ease, border-color 160ms ease;
    }

    .auth-btn:hover {
        background: rgba(51, 65, 85, 0.95);
        border-color: rgba(129, 140, 248, 0.75);
    }
</style>
{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-md reveal">
    <div class="auth-card p-7 md:p-8">
        <p class="text-xs font-semibold tracking-[0.2em] text-emerald-300 text-center mb-2">WELCOME BACK</p>
        <h2 class="text-2xl font-black text-center mb-6 text-white">Student Login</h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            {{ form.username }}
            {{ form.password }}

            <button class="auth-btn">Login as Student</button>
        </form>

        <p class="text-center text-sm mt-4 text-slate-300">
            <a href="{% url 'forgot_password' %}" class="text-emerald-300 hover:text-emerald-200 underline-offset-2 hover:underline">Forgot password?</a>
        </p>

        <p class="text-center text-sm mt-4 text-slate-300">
            Don't have an account?
            <a href="{% url 'student_register' %}" class="text-emerald-300 hover:text-emerald-200 underline-offset-2 hover:underline">Register</a>
        </p>
    </div>
</div>
{% endblock %}
