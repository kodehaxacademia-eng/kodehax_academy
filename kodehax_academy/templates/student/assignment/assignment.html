{% extends "student/base.html" %}

{% block title %}Assignments{% endblock %}

{% block header %}Assignments{% endblock %}

{% block content %}
<section class="space-y-5 reveal">
  <div class="rounded-2xl border border-slate-700 bg-slate-900/50 p-3">
    <div class="flex flex-wrap gap-2">
      <a href="{% url 'view_assignment' %}" class="inline-flex items-center justify-center rounded-lg px-4 py-2 text-sm font-semibold transition {% if 'view_assignment' in request.path %}bg-teal-500 text-slate-900 shadow-sm{% else %}bg-slate-900/60 text-slate-200 border border-slate-600 hover:bg-slate-800{% endif %}">
        View Assignments
      </a>
      <a href="{% url 'submit_assignment' %}" class="inline-flex items-center justify-center rounded-lg px-4 py-2 text-sm font-semibold transition {% if 'submit_assignment' in request.path %}bg-teal-500 text-slate-900 shadow-sm{% else %}bg-slate-900/60 text-slate-200 border border-slate-600 hover:bg-slate-800{% endif %}">
        Submit Assignment
      </a>
    </div>
  </div>

  <div class="rounded-2xl border border-slate-700 bg-slate-900/45 p-5 sm:p-6 reveal delay-1">
    {% block assignment_content %}
    {% endblock %}
  </div>
</section>

{% endblock %}
