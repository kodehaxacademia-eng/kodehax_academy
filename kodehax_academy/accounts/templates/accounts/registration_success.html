{% extends "user/base.html" %}

{% block title %}Check Your Email{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl reveal">
    <div class="glass-card p-8 md:p-10 text-center">
        <p class="text-xs uppercase tracking-[0.18em] text-emerald-300">Registration successful</p>
        <h1 class="mt-3 text-3xl font-black text-white">Check Your Inbox</h1>
        <p class="mt-4 text-slate-300">Authenticate email from inbox to login.</p>
        <div class="mt-6 flex justify-center">
            <a href="{% url 'student_login' %}" class="btn-primary px-6 py-3">Go to login</a>
        </div>
    </div>
</div>
{% endblock %}
