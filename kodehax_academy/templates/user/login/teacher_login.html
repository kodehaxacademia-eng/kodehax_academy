{% extends "user/base.html" %}

{% block title %}Teacher Login{% endblock %}

{% block content %}
<div class="w-full max-w-md animate-fade-up">
    <div class="portal-card bg-white/90 backdrop-blur p-8 rounded-2xl shadow-2xl border border-blue-100">

        <p class="text-xs font-semibold tracking-[0.2em] text-blue-600 text-center mb-2">WELCOME BACK</p>
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
            Teacher Login
        </h2>

        <form method="POST" class="space-y-4">

            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
            class="w-full border border-blue-100 p-3 rounded-xl bg-white/80 focus:outline-none focus:ring-2 focus:ring-blue-500 transition focus:-translate-y-0.5">

            <input type="password" name="password" placeholder="Password"
            class="w-full border border-blue-100 p-3 rounded-xl bg-white/80 focus:outline-none focus:ring-2 focus:ring-blue-500 transition focus:-translate-y-0.5">

            <button
            class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition hover:scale-[1.02]">
            Login as Teacher
            </button>

        </form>

        <p class="text-center text-sm mt-4 text-gray-600">
            Don't have an account?
            <a href="{% url 'teacher_register' %}" class="text-blue-600 hover:underline transition hover:text-blue-700">
                Register
            </a>
        </p>

    </div>
</div>
{% endblock %}
