{% extends "student/base.html" %}
{% load static %}

{% block title %}AI Assistant{% endblock %}
{% block page_title %}Student AI Assistant{% endblock %}

{% block content %}
<div class="glass-card p-4">
    <div class="mode-row">
        <button onclick="setMode('tutor')" id="btn-tutor" class="mode-btn active-mode">AI Tutor</button>
        <button onclick="setMode('course_qa')" id="btn-course_qa" class="mode-btn">Course Q&A</button>
        <button onclick="setMode('quiz')" id="btn-quiz" class="mode-btn">Quiz Me</button>
        <button onclick="setMode('summarize')" id="btn-summarize" class="mode-btn">Summarize</button>
    </div>

    <div id="chat-box" class="chat-shell">
        <div class="placeholder" id="placeholder">Ask me anything about your course.</div>
    </div>

    <div class="chat-input-row">
        <input id="user-input" type="text" placeholder="Type your question and press Enter..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()" id="send-btn" class="send-btn">Send</button>
    </div>
</div>

<style>
  :root {
    --chat-surface: rgba(0,0,0,0.2);
    --chat-border: var(--border);
    --chat-text: var(--text);
    --chat-muted: var(--muted);
    --chat-user-start: #0e7490; /* cyan-700 */
    --chat-user-end: #06b6d4; /* cyan-500 */
    --chat-assistant-bg: rgba(0,0,0,0.25);
    --chat-code-bg: #020617; /* slate-950 */
    --chat-code-header: #1e293b; /* slate-800 */
    --chat-accent: var(--accent); /* teal-500 from base */
  }

  .mode-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.85rem;
  }

  .mode-btn {
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--chat-border);
    color: var(--chat-muted);
    border-radius: 999px;
    padding: 0.42rem 0.85rem;
    font-size: 0.82rem;
    font-weight: 600;
    transition: 180ms ease;
  }

  .mode-btn:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  .active-mode {
    background: var(--chat-accent);
    border-color: transparent;
    color: #000212;
    box-shadow: 0 8px 18px rgba(20, 184, 166, 0.3);
  }

  .chat-shell {
    height: 58vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    background: var(--chat-surface);
    border: 1px solid var(--chat-border);
    border-radius: 14px;
    padding: 0.9rem;
    margin-bottom: 0.85rem;
  }

  .placeholder {
    text-align: center;
    color: var(--chat-muted);
    margin-top: 2.4rem;
    font-size: 0.92rem;
  }

  .chat-bubble {
    max-width: min(95%, 52rem);
    border-radius: 14px;
    padding: 0.72rem 0.85rem;
    animation: bubbleIn 210ms ease-out;
    border: 1px solid transparent;
  }

  .bubble-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.42rem;
  }

  .bubble-name {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .bubble-time {
    font-size: 0.7rem;
    color: var(--chat-muted);
  }

  .user-bubble {
    align-self: flex-end;
    margin-left: auto;
    background: linear-gradient(135deg, var(--chat-user-start), var(--chat-user-end));
    color: #ffffff;
    border-radius: 14px 14px 2px 14px;
    box-shadow: 0 10px 20px rgba(6, 182, 212, 0.24);
  }

  .assistant-bubble {
    align-self: flex-start;
    background: var(--chat-assistant-bg);
    border-color: var(--chat-border);
    color: var(--chat-text);
    border-radius: 14px 14px 14px 2px;
  }

  .assistant-name {
    color: var(--chat-accent);
  }

  .assistant-content {
    line-height: 1.6;
    color: var(--text);
    font-size: 0.92rem;
  }

  .assistant-content h1,
  .assistant-content h2,
  .assistant-content h3 {
    margin: 0.5rem 0 0.35rem;
    font-weight: 600;
    color: #f8fafc;
  }

  .assistant-content h1 { font-size: 1rem; }
  .assistant-content h2 { font-size: 0.96rem; }
  .assistant-content h3 { font-size: 0.93rem; }

  .assistant-content p {
    margin: 0.4rem 0;
    color: #d5d7df;
  }

  .assistant-content ul,
  .assistant-content ol {
    margin: 0.3rem 0 0.55rem;
    padding-left: 1.1rem;
  }

  .assistant-content li {
    margin: 0.14rem 0;
  }

  .assistant-content blockquote {
    border-left: 3px solid var(--border);
    margin: 0.5rem 0;
    padding: 0.2rem 0 0.2rem 0.75rem;
    color: var(--muted);
    background: #101219;
    border-radius: 0 8px 8px 0;
  }

  .inline-code {
    background: #0f172a;
    border: 1px solid #1e293b;
    color: #dbeafe;
    border-radius: 6px;
    font-size: 0.82em;
    padding: 0.08rem 0.3rem;
    font-family: Consolas, "Courier New", monospace;
  }

  .code-card {
    margin: 0.5rem 0;
    border: 1px solid var(--border);
    border-radius: 11px;
    overflow: hidden;
    background: var(--chat-code-bg);
  }

  .code-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.43rem 0.65rem;
    background: var(--chat-code-header);
    color: var(--muted);
    font-size: 0.75rem;
    font-weight: 600;
  }

  .copy-btn {
    background: #111827;
    border: 1px solid #273449;
    color: var(--muted);
    font-size: 0.68rem;
    border-radius: 6px;
    padding: 0.14rem 0.4rem;
    cursor: pointer;
  }

  .copy-btn:hover {
    background: #1e293b;
  }

  .code-card pre {
    margin: 0;
    padding: 0.78rem 0.85rem;
    overflow-x: auto;
    color: #e0e7ff; /* indigo-100 */
    font-size: 0.83rem;
    line-height: 1.45;
    font-family: Consolas, "Courier New", monospace;
  }

  .typing-indicator {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 0.22rem;
    padding: 0.58rem 0.72rem;
    border: 1px solid var(--chat-border);
    border-radius: 14px;
    background: var(--chat-assistant-bg);
  }

  .typing-dot {
    width: 0.36rem;
    height: 0.36rem;
    background: var(--chat-accent);
    border-radius: 999px;
    animation: pulseDot 1.1s infinite ease-in-out;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  .typing-label {
    color: var(--muted);
    margin-left: 0.3rem;
    font-size: 0.75rem;
  }

  .chat-input-row {
    display: flex;
    gap: 0.55rem;
  }

  .chat-input-row input {
    flex: 1;
    background: rgba(0,0,0,0.2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.58rem 0.78rem;
    font-size: 0.9rem;
    outline: none;
    transition: 180ms ease;
  }

  .chat-input-row input::placeholder {
    color: var(--muted);
  }

  .chat-input-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.3);
  }

  .send-btn {
    border: 0;
    color: #000212;
    background: var(--accent);
    border-radius: 12px;
    padding: 0.58rem 1rem;
    font-weight: 600;
    font-size: 0.86rem;
    box-shadow: 0 10px 20px rgba(20, 184, 166, 0.3);
    transition: 180ms ease;
  }

  .send-btn:hover {
    filter: brightness(1.05);
  }

  .send-btn:disabled {
    opacity: 0.65;
    cursor: not-allowed;
    box-shadow: none;
    filter: none;
  }

  @keyframes bubbleIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulseDot {
    0%, 80%, 100% {
      transform: scale(0.7);
      opacity: 0.35;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }
</style>

{% endblock %}

{% block extra_scripts %}
<script>
  let chatHistory = [];
  let currentMode = "tutor";
  let copyButtonCounter = 0;

  function setMode(mode) {
    currentMode = mode;
    chatHistory = [];
    document.getElementById("chat-box").innerHTML =
      '<div class="placeholder" id="placeholder">Ask me anything about your course.</div>';

    document.querySelectorAll(".mode-btn").forEach(btn => btn.classList.remove("active-mode"));
    document.getElementById("btn-" + mode).classList.add("active-mode");
  }

  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function applyInlineFormat(text) {
    let html = escapeHtml(text);
    html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
    return html;
  }

  function renderRichText(text) {
    const lines = text.replace(/\r\n/g, "\n").split("\n");
    let output = "";
    let paragraph = [];
    let inUl = false;
    let inOl = false;

    const closeParagraph = () => {
      if (!paragraph.length) return;
      output += `<p>${applyInlineFormat(paragraph.join(" "))}</p>`;
      paragraph = [];
    };

    const closeLists = () => {
      if (inUl) {
        output += "</ul>";
        inUl = false;
      }
      if (inOl) {
        output += "</ol>";
        inOl = false;
      }
    };

    for (const rawLine of lines) {
      const line = rawLine.trim();

      if (!line) {
        closeParagraph();
        closeLists();
        continue;
      }

      const heading = line.match(/^(#{1,3})\s+(.+)$/);
      if (heading) {
        closeParagraph();
        closeLists();
        const level = heading[1].length;
        output += `<h${level}>${applyInlineFormat(heading[2])}</h${level}>`;
        continue;
      }

      const ulItem = line.match(/^[-*]\s+(.+)$/);
      if (ulItem) {
        closeParagraph();
        if (inOl) {
          output += "</ol>";
          inOl = false;
        }
        if (!inUl) {
          output += "<ul>";
          inUl = true;
        }
        output += `<li>${applyInlineFormat(ulItem[1])}</li>`;
        continue;
      }

      const olItem = line.match(/^\d+\.\s+(.+)$/);
      if (olItem) {
        closeParagraph();
        if (inUl) {
          output += "</ul>";
          inUl = false;
        }
        if (!inOl) {
          output += "<ol>";
          inOl = true;
        }
        output += `<li>${applyInlineFormat(olItem[1])}</li>`;
        continue;
      }

      const quote = line.match(/^>\s?(.+)$/);
      if (quote) {
        closeParagraph();
        closeLists();
        output += `<blockquote>${applyInlineFormat(quote[1])}</blockquote>`;
        continue;
      }

      paragraph.push(line);
    }

    closeParagraph();
    closeLists();

    return output || `<p>${applyInlineFormat(text)}</p>`;
  }

  function renderAssistantContent(content, hasCode) {
    const codeBlockPattern = /```([\w+-]*)\n([\s\S]*?)\n```/g;

    if (!hasCode && !codeBlockPattern.test(content)) {
      return `<div class="assistant-content">${renderRichText(content)}</div>`;
    }

    codeBlockPattern.lastIndex = 0;
    let cursor = 0;
    let output = "";
    let match;

    while ((match = codeBlockPattern.exec(content)) !== null) {
      const before = content.slice(cursor, match.index).trim();
      if (before) {
        output += `<div class="assistant-content">${renderRichText(before)}</div>`;
      }

      const language = match[1] ? escapeHtml(match[1]) : "code";
      const code = match[2];
      const codeId = `copy-code-${copyButtonCounter++}`;

      output += `
        <div class="code-card">
          <div class="code-card-header">
            <span>${language}</span>
            <button class="copy-btn" onclick="copyCode('${codeId}', this)">Copy</button>
          </div>
          <pre id="${codeId}"><code>${escapeHtml(code)}</code></pre>
        </div>
      `;

      cursor = codeBlockPattern.lastIndex;
    }

    const tail = content.slice(cursor).trim();
    if (tail) {
      output += `<div class="assistant-content">${renderRichText(tail)}</div>`;
    }

    return output || `<div class="assistant-content"><p>${escapeHtml(content)}</p></div>`;
  }

  function appendMessage(role, content, hasCode = false) {
    const placeholder = document.getElementById("placeholder");
    if (placeholder) placeholder.remove();

    const chatBox = document.getElementById("chat-box");
    const bubble = document.createElement("div");
    bubble.classList.add("chat-bubble", role === "user" ? "user-bubble" : "assistant-bubble");

    const name = role === "user" ? "You" : "Assistant";
    const nameClass = role === "user" ? "bubble-name" : "bubble-name assistant-name";
    const body = role === "user"
      ? `<div class="assistant-content"><p>${escapeHtml(content)}</p></div>`
      : renderAssistantContent(content, hasCode);

    bubble.innerHTML = `
      <div class="bubble-meta">
        <span class="${nameClass}">${name}</span>
        <span class="bubble-time">${nowTime()}</span>
      </div>
      ${body}
    `;

    chatBox.appendChild(bubble);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function appendTyping() {
    const chatBox = document.getElementById("chat-box");
    const typing = document.createElement("div");
    typing.id = "typing-indicator";
    typing.className = "typing-indicator";
    typing.innerHTML = `
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-label">Thinking...</span>
    `;
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const typing = document.getElementById("typing-indicator");
    if (typing) typing.remove();
  }

  async function copyCode(codeId, btn) {
    const target = document.getElementById(codeId);
    if (!target) return;

    try {
      await navigator.clipboard.writeText(target.innerText);
      const oldText = btn.innerText;
      btn.innerText = "Copied";
      setTimeout(() => {
        btn.innerText = oldText;
      }, 900);
    } catch (err) {
      btn.innerText = "Failed";
      setTimeout(() => {
        btn.innerText = "Copy";
      }, 900);
    }
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    input.disabled = true;
    document.getElementById("send-btn").disabled = true;

    appendMessage("user", message);
    appendTyping();

    chatHistory.push({ role: "user", content: message });

    try {
      const response = await fetch("/student/chat/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message,
          mode: currentMode,
          history: chatHistory.slice(0, -1)
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.reply) {
        appendMessage("assistant", data.reply, Boolean(data.has_code));
        chatHistory.push({ role: "assistant", content: data.reply });
      } else {
        appendMessage("assistant", "Error: " + (data.error || "Unknown error"));
      }
    } catch (err) {
      removeTyping();
      appendMessage("assistant", "Could not connect. Make sure Ollama is running on port 11434.");
    } finally {
      input.disabled = false;
      document.getElementById("send-btn").disabled = false;
      input.focus();
    }
  }
</script>
{% endblock %}
