{% extends "student/base.html" %}
{% load static %}

{% block title %}AI Assistant{% endblock %}

{% block header %}Student AI Assistant{% endblock %}

{% block content %}

<!-- Mode Selector -->
<div class="mode-row flex gap-2 pb-4 flex-wrap">
  <button onclick="setMode('tutor')" id="btn-tutor"
    class="mode-btn active-mode px-3 py-1 rounded-full text-sm font-medium transition">
    AI Tutor
  </button>
  <button onclick="setMode('course_qa')" id="btn-course_qa"
    class="mode-btn px-3 py-1 rounded-full text-sm font-medium transition">
    Course Q&A
  </button>
  <button onclick="setMode('quiz')" id="btn-quiz"
    class="mode-btn px-3 py-1 rounded-full text-sm font-medium transition">
    Quiz Me
  </button>
  <button onclick="setMode('summarize')" id="btn-summarize"
    class="mode-btn px-3 py-1 rounded-full text-sm font-medium transition">
    Summarize
  </button>
</div>

<!-- Chat Messages -->
<div id="chat-box" class="overflow-y-auto flex flex-col gap-3 rounded-xl p-4 mb-4 chat-shell" style="height: 55vh;">
  <div class="text-center text-gray-400 text-sm mt-10" id="placeholder">
    Ask me anything about your course.
  </div>
</div>

<!-- Input Area -->
<div class="chat-input-row flex gap-2">
  <input
    id="user-input"
    type="text"
    placeholder="Type your question and press Enter..."
    class="flex-1 border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none"
    onkeydown="if(event.key==='Enter') sendMessage()"
  />
  <button
    onclick="sendMessage()"
    id="send-btn"
    class="text-white px-5 py-2 rounded-xl text-sm font-medium transition send-btn">
    Send
  </button>
</div>

<style>
  :root {
    --chat-primary: #0b57d0;
    --chat-surface: #f8fafc;
    --chat-border: #dbe3ef;
    --chat-user-start: #0b57d0;
    --chat-user-end: #1d4ed8;
    --chat-assistant-bg: #ffffff;
    --chat-code-bg: #0f172a;
    --chat-code-header: #111827;
  }

  .chat-shell {
    background:
      radial-gradient(circle at 0% 0%, #e0ecff 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #e9f4ff 0%, transparent 50%),
      var(--chat-surface);
    border: 1px solid var(--chat-border);
  }

  .mode-row {
    animation: popIn 320ms ease-out;
  }

  .mode-btn {
    background: #ffffff;
    border: 1px solid #bfdbfe;
    color: #1e3a8a;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    transform: translateY(0);
  }

  .mode-btn:hover {
    transform: translateY(-1px);
    border-color: #93c5fd;
  }

  .active-mode {
    background: linear-gradient(135deg, #0b57d0, #2563eb);
    color: white;
    border-color: #0b57d0;
    box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
  }

  .chat-bubble {
    animation: bubbleIn 220ms ease-out;
  }

  .user-bubble {
    background: linear-gradient(135deg, var(--chat-user-start), var(--chat-user-end));
    color: white;
    border-radius: 1rem 1rem 0.3rem 1rem;
    max-width: min(90%, 33rem);
    box-shadow: 0 10px 20px rgba(30, 64, 175, 0.2);
  }

  .assistant-bubble {
    background: var(--chat-assistant-bg);
    border: 1px solid var(--chat-border);
    color: #1f2937;
    border-radius: 1rem 1rem 1rem 0.3rem;
    max-width: min(95%, 48rem);
    box-shadow: 0 8px 16px rgba(15, 23, 42, 0.06);
  }

  .assistant-title {
    color: var(--chat-primary);
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 0.3rem;
  }

  .assistant-text {
    white-space: pre-wrap;
    line-height: 1.5;
  }

  .code-card {
    margin-top: 0.6rem;
    border: 1px solid #334155;
    border-radius: 0.75rem;
    overflow: hidden;
    background: var(--chat-code-bg);
  }

  .code-card-header {
    background: var(--chat-code-header);
    color: #e5e7eb;
    font-size: 0.76rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 0.45rem 0.65rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .copy-btn {
    background: #1f2937;
    color: #d1d5db;
    border: 1px solid #374151;
    border-radius: 0.45rem;
    font-size: 0.7rem;
    padding: 0.15rem 0.45rem;
    cursor: pointer;
  }

  .copy-btn:hover {
    background: #334155;
  }

  .code-card pre {
    margin: 0;
    padding: 0.8rem 0.95rem;
    overflow-x: auto;
    color: #cbd5e1;
    font-size: 0.82rem;
    line-height: 1.45;
    font-family: "Consolas", "Courier New", monospace;
  }

  .typing-indicator {
    display: inline-flex;
    gap: 0.28rem;
    align-items: center;
    padding: 0.75rem 0.9rem;
    border-radius: 0.85rem;
    border: 1px solid var(--chat-border);
    background: #ffffff;
  }

  .typing-dot {
    width: 0.4rem;
    height: 0.4rem;
    border-radius: 999px;
    background: #60a5fa;
    animation: pulseDot 1.1s infinite ease-in-out;
  }

  .typing-dot:nth-child(2) {
    animation-delay: 0.15s;
  }

  .typing-dot:nth-child(3) {
    animation-delay: 0.3s;
  }

  .chat-input-row input {
    border-color: #cbd5e1;
    box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.05);
  }

  .chat-input-row input:focus {
    border-color: #93c5fd;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
  }

  .send-btn {
    background: linear-gradient(135deg, #0b57d0, #2563eb);
    box-shadow: 0 10px 18px rgba(37, 99, 235, 0.24);
  }

  .send-btn:hover {
    filter: brightness(1.05);
  }

  .send-btn:disabled {
    opacity: 0.65;
    cursor: not-allowed;
    box-shadow: none;
  }

  @keyframes bubbleIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes pulseDot {
    0%, 80%, 100% {
      transform: scale(0.7);
      opacity: 0.4;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes popIn {
    from {
      opacity: 0;
      transform: translateY(-6px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

{% endblock %}


{% block extra_scripts %}
<script>
  let chatHistory = [];
  let currentMode = "tutor";
  let copyButtonCounter = 0;

  function setMode(mode) {
    currentMode = mode;
    chatHistory = [];
    document.getElementById("chat-box").innerHTML = `
      <div class="text-center text-gray-400 text-sm mt-10" id="placeholder">
        Ask me anything about your course.
      </div>`;

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.classList.remove("active-mode");
    });

    const active = document.getElementById("btn-" + mode);
    active.classList.add("active-mode");
  }

  function appendMessage(role, content, hasCode = false) {
    const placeholder = document.getElementById("placeholder");
    if (placeholder) placeholder.remove();

    const chatBox = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.classList.add("chat-bubble");

    if (role === "user") {
      div.classList.add("self-end", "user-bubble", "px-4", "py-2", "text-sm", "ml-auto");
      div.innerHTML = `<span class="font-semibold block mb-1">You</span>${escapeHtml(content)}`;
    } else {
      div.classList.add("self-start", "assistant-bubble", "px-4", "py-2", "text-sm");
      div.innerHTML = `<span class="assistant-title block">Llama</span>${renderAssistantContent(content, hasCode)}`;
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function appendTyping() {
    const chatBox = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.id = "typing-indicator";
    div.className = "self-start typing-indicator";
    div.innerHTML = `
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="text-xs text-slate-500 ml-1">Thinking...</span>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderAssistantContent(content, hasCode) {
    if (!hasCode && !/```[\w+-]*\n[\s\S]*?\n```/.test(content)) {
      return `<div class="assistant-text">${escapeHtml(content).replace(/\n/g, "<br>")}</div>`;
    }

    const blockPattern = /```([\w+-]*)\n([\s\S]*?)\n```/g;
    let cursor = 0;
    let output = "";
    let match;

    while ((match = blockPattern.exec(content)) !== null) {
      const before = content.slice(cursor, match.index).trim();
      if (before) {
        output += `<div class="assistant-text">${escapeHtml(before).replace(/\n/g, "<br>")}</div>`;
      }

      const language = match[1] ? escapeHtml(match[1]) : "code";
      const code = match[2];
      const codeId = `copy-code-${copyButtonCounter++}`;
      output += `
        <div class="code-card">
          <div class="code-card-header">
            <span>${language}</span>
            <button class="copy-btn" onclick="copyCode('${codeId}', this)">Copy</button>
          </div>
          <pre id="${codeId}"><code>${escapeHtml(code)}</code></pre>
        </div>
      `;
      cursor = blockPattern.lastIndex;
    }

    const tail = content.slice(cursor).trim();
    if (tail) {
      output += `<div class="assistant-text mt-2">${escapeHtml(tail).replace(/\n/g, "<br>")}</div>`;
    }

    return output || `<div class="assistant-text">${escapeHtml(content).replace(/\n/g, "<br>")}</div>`;
  }

  async function copyCode(codeId, btn) {
    const target = document.getElementById(codeId);
    if (!target) return;

    try {
      await navigator.clipboard.writeText(target.innerText);
      const oldText = btn.innerText;
      btn.innerText = "Copied";
      setTimeout(() => {
        btn.innerText = oldText;
      }, 1000);
    } catch (err) {
      btn.innerText = "Failed";
      setTimeout(() => {
        btn.innerText = "Copy";
      }, 1000);
    }
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    input.disabled = true;
    document.getElementById("send-btn").disabled = true;

    appendMessage("user", message);
    appendTyping();

    chatHistory.push({ role: "user", content: message });

    try {
      const response = await fetch("/student/chat/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: message,
          mode: currentMode,
          history: chatHistory.slice(0, -1)
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.reply) {
        appendMessage("assistant", data.reply, Boolean(data.has_code));
        chatHistory.push({ role: "assistant", content: data.reply });
      } else {
        appendMessage("assistant", "Error: " + (data.error || "Unknown error"));
      }

    } catch (err) {
      removeTyping();
      appendMessage("assistant", "Could not connect. Make sure Ollama is running on port 11434.");
    } finally {
      input.disabled = false;
      document.getElementById("send-btn").disabled = false;
      input.focus();
    }
  }
</script>
{% endblock %}
